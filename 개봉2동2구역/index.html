<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개봉2동 2구역 블럭 확인 지도</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
    <!-- Daum 우편번호 서비스 (별도 앱키 없이 사용 가능) -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="panel">
        <p class="top-link">
          <a href="https://open.kakao.com/o/gk5rJapi" target="_blank" rel="noreferrer">
            개봉2구역 공공모아타운 추진 오픈채팅방
          </a> 
          바로 가기
        </p>

        <div class="controls">
          <button id="locateBtn" type="button">📍 현위치 찾기</button>
          <button id="postcodeBtn" type="button" class="secondary">다음 주소찾기</button>
        </div>

        <p id="status" class="status">지도를 불러오는 중입니다...</p>
      </header>

      <section id="map" aria-label="지도"></section>

      <section class="openchat-section" aria-label="오픈채팅 이미지">
        <img class="openchat-image" src="openchat.JPG" alt="오픈채팅 안내 이미지" />
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
